<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新加坡4天3晚攻略 | 极客论坛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; }
        .tag { display: inline-flex; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; margin-right: 0.5rem; }
        .tag-blue { background: #dbeafe; color: #1d4ed8; }
        .location-card { background: white; border: 1px solid #f3f4f6; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .timeline { position: relative; padding-left: 2rem; }
        .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, #3b82f6, #93c5fd); border-radius: 3px; }
        .timeline-item { position: relative; padding-bottom: 1.5rem; }
        .timeline-item::before { content: ''; position: absolute; left: -2rem; top: 0.25rem; width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; transform: translateX(-4.5px); }
    </style>
</head>
<body class="antialiased">
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="../../index.html" class="flex items-center gap-2 text-gray-700 hover:text-gray-900">
                <span>← 返回</span>
            </a>
            <a href="singapore-travel-guide.html" class="text-sm text-gray-500">← 返回新加坡攻略</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-8">
            <span class="tag tag-blue">4天3晚</span>
            <h1 class="text-3xl font-bold mt-4">🇸🇬 新加坡4天3晚经典游攻略</h1>
            <p class="text-gray-500 mt-2">适合小长假旅行</p>
        </header>
        <img src="sg1.jpg" alt="新加坡" class="w-full rounded-xl shadow-lg mb-8">
        <article>
            <div class="location-card">
                <h2 class="text-xl font-bold text-blue-700 mb-4">📅 行程概览</h2>
                <div class="timeline">
                    <div class="timeline-item"><h3 class="font-bold">Day 1</h3><p>鱼尾狮公园 → 滨海湾花园 → 摩天轮</p></div>
                    <div class="timeline-item"><h3 class="font-bold">Day 2</h3><p>圣淘沙 → 环球影城 → 海滩</p></div>
                    <div class="timeline-item"><h3 class="font-bold">Day 4</h3><p>牛车水 → 乌节路 → 星耀樟宜</p></div>
                </div>
            </div>
            <h2 class="text-xl font-bold mt-8 mb-4">🏝️ Day 1</h2>
            <div class="location-card">
                <h3>🌆 鱼尾狮公园</h3><p>新加坡地标！建议早上或傍晚去</p>
            </div>
            <div class="location-card">
                <h3>🌸 滨海湾花园</h3><p>超级树夜景超震撼！晚上7:45有灯光秀</p>
            </div>
            <h2 class="text-xl font-bold mt-8 mb-4">🎢 Day 2</h2>
            <div class="location-card">
                <h3>环球影城</h3><p>必玩：变形金刚、木乃伊复仇记</p>
            </div>
            <h2 class="text-xl font-bold mt-8 mb-4">🛍️ Day 4</h2>
            <div class="location-card">
                <h3>牛车水 + 乌节路</h3><p>购物+美食</p>
            </div>
            <div class="mt-8 p-4 bg-blue-50 rounded-lg">
                <p>👉 <a href="singapore-travel-guide.html" class="underline">返回</a> | <a href="singapore-4days.html" class="underline">4天3晚</a> | <a href="singapore-5days.html" class="underline">5天4晚</a></p>
            </div>
        </article>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
