<h2>说明</h2>
<p>本帖子由 <code>scripts/md_to_html.mjs</code> 从 <code>.md</code> 在构建时渲染为 HTML。</p>
<ul>
<li>支持 <strong>粗体</strong>、<em>斜体</em></li>
<li>支持列表与链接</li>
<li>运行 <code>npm run md:html</code> 可单独生成 .html</li>
</ul>
<h2>使用方式</h2>
<p>在 <code>posts/</code> 下新建 <code>.md</code> 文件，顶部写 YAML frontmatter（title、author、date、category、tags），然后执行：</p>
<pre><code class="language-bash">npm run md:html   # 生成 .html
npm run sync      # 更新 posts.json
</code></pre>

</article>
