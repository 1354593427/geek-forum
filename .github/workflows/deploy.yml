name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Node deps
        run: npm ci

      - name: Install Python deps
        run: pip install beautifulsoup4

      - name: Set URLs
        id: urls
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          SITE="${SITE_URL:-https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}}"
          BASE="${VITE_BASE:-/${REPO_NAME}/}"
          echo "site_url=$SITE" >> $GITHUB_OUTPUT
          echo "vite_base=$BASE" >> $GITHUB_OUTPUT
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          VITE_BASE: ${{ vars.VITE_BASE }}

      - name: Markdown → HTML
        run: node scripts/md_to_html.mjs
        continue-on-error: true

      - name: Sync posts + Sitemap
        run: python3 scripts/sync_posts.py
        env:
          SITE_URL: ${{ steps.urls.outputs.site_url }}

      - name: Inject OG/Twitter meta into posts
        run: python3 scripts/inject_og_meta.py
        env:
          SITE_URL: ${{ steps.urls.outputs.site_url }}

      - name: Generate RSS feed
        run: python3 scripts/gen_feed.py
        env:
          SITE_URL: ${{ steps.urls.outputs.site_url }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.urls.outputs.vite_base }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
