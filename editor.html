<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 在线排版编辑器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#0d47a1', secondary: '#00acc1' }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        #editor-container {
            height: 400px;
            background: white;
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
        }

        .ql-toolbar.ql-snow {
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
            background: #f1f5f9;
            border-color: #e2e8f0;
        }

        .ql-container.ql-snow {
            border-color: #e2e8f0;
        }

        .output-box {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>

<body class="antialiased min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="text-gray-500 hover:text-primary transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </a>
                    <span class="font-bold text-gray-900 text-lg">内容排版工作室</span>
                </div>
                <div class="flex space-x-4">
                    <button onclick="copyHtml()"
                        class="inline-flex items-center px-4 py-2 border border-primary text-sm font-medium rounded-lg text-primary bg-white hover:bg-blue-50 focus:outline-none transition-colors">
                        复制 HTML 源码
                    </button>
                    <button onclick="downloadHtml()"
                        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-lg text-white bg-primary shadow-sm hover:bg-blue-800 focus:outline-none transition-colors">
                        下载页面文件
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 mt-8">

        <div class="bg-blue-50 text-blue-800 p-4 rounded-lg mb-6 text-sm flex gap-3 shadow-sm border border-blue-100">
            <svg class="w-5 h-5 flex-shrink-0 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div>
                <strong>使用说明：</strong>
                在下方编辑器输入图文内容排版。完成后点击右上角 <strong>下载页面文件</strong>。将其放入仓库的 <code>posts/</code> 目录下并推送到 GitHub 即可更新您的网站。
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-1 gap-8">

            <!-- Editor Column -->
            <div class="space-y-4">
                <div class="flex flex-col">
                    <label class="text-sm border-none font-bold text-gray-700 mb-2">文章标题</label>
                    <input type="text" id="post-title" placeholder="如：机器人仿真平台技术选型"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-primary focus:border-primary">
                </div>

                <div class="flex flex-col pt-4">
                    <label class="text-sm font-bold text-gray-700 mb-2">正文编辑器</label>
                    <div class="border border-gray-200 rounded-lg shadow-sm">
                        <div id="editor-container"></div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Scripts -->
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '开始撰写您的精彩内容...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // Template string for building the full page
        function getFullHtml() {
            const title = document.getElementById('post-title').value || '未命名文章';
            const content = quill.root.innerHTML;

            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f7fa; color: #334155; }
        .post-content h1 { font-size: 2.25rem; font-weight: bold; margin-bottom: 2rem; color: #1e293b; }
        .post-content h2 { font-size: 1.5rem; font-weight: bold; margin-top: 2rem; margin-bottom: 1rem; color: #1e293b; }
        .post-content p { margin-bottom: 1.5rem; line-height: 1.8; color: #475569; }
        .post-content img { border-radius: 0.5rem; margin: 2rem 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .post-content ul { list-style-type: disc; padding-left: 2rem; margin-bottom: 1.5rem; }
        .post-content ol { list-style-type: decimal; padding-left: 2rem; margin-bottom: 1.5rem; }
        .post-content a { color: #0d47a1; text-decoration: underline; }
    </style>
</head>
<body class="antialiased">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 border-b border-gray-100 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center gap-4">
            <a href="../index.html" class="w-8 h-8 rounded bg-blue-600 text-white flex items-center justify-center font-bold">W</a>
            <span class="text-gray-500 font-medium">Research Portal</span>
        </div>
    </nav>
    
    <!-- Content Header -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4 py-16 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 tracking-tight">${title}</h1>
            <div class="mt-6 text-gray-500 flex items-center justify-center gap-4 text-sm">
                <span>By W's Station</span>
                <span>•</span>
                <span>${new Date().toLocaleDateString('zh-CN')}</span>
            </div>
        </div>
    </header>

    <!-- Main article -->
    <main class="max-w-4xl mx-auto px-4 py-16 bg-white shadow-xl -mt-8 rounded-xl relative z-10 border border-gray-100 mb-20">
        <article class="post-content px-4 md:px-12">
            ${content}
        </article>
    </main>
</body>
</html>`;
        }

        function copyHtml() {
            const html = getFullHtml();
            navigator.clipboard.writeText(html).then(() => {
                alert('HTML源码已复制到剪贴板！');
            });
        }

        function downloadHtml() {
            let title = document.getElementById('post-title').value.trim() || 'post';
            // sanitizing filename
            title = title.replace(/[^a-z0-9\u4e00-\u9fa5]/gi, '-').toLowerCase();
            const html = getFullHtml();
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `${title}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
