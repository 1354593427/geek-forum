<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw | Workstation SPA</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind (disable warnings for dev) -->
    <script src="https://cdn.tailwindcss.com?warning=false"></script>
    
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/theme/dracula.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/addon/fold/foldgutter.css">
    
    <!-- Fuse.js as global -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    
    <!-- Import Map - 修复 fuse.js 引用 -->
    <script type="importmap">
    {
        "imports": {
            "fuse.js": "https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js",
            "./src/core/": "./src/core/",
            "./src/components/": "./src/components/",
            "./src/utils/": "./src/utils/"
        }
    }
    </script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/components.css">
</head>
<body class="antialiased flex h-screen overflow-hidden">
    <!-- Column 1: Navigation Sidebar -->
    <aside id="sidebarColumn" class="sidebar"></aside>
    
    <!-- Resizer 1 -->
    <div id="resizer1" class="resizer"></div>
    
    <!-- Column 2: Explorer -->
    <main id="explorerColumn" class="explorer">
        <header class="p-6 border-b border-gray-50 bg-white/90 backdrop-blur sticky top-0 z-10">
            <div class="relative group mb-4">
                <input type="text" id="postSearch" placeholder="搜索全球研报 / 技术文档..." 
                    class="w-full pl-10 pr-4 py-2.5 text-sm bg-gray-50 border border-transparent rounded-xl focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all outline-none">
                <svg class="absolute left-3.5 top-3.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <div class="flex items-center justify-between">
                <span id="resultsCount" class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Latest Research</span>
                <select id="sortOrder" class="text-[10px] font-black text-brand-600 bg-transparent outline-none uppercase tracking-tighter cursor-pointer">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
            </div>
        </header>
        <div id="postList" class="flex-grow overflow-y-auto overflow-x-hidden p-4 space-y-3"></div>
    </main>
    
    <!-- Resizer 2 -->
    <div id="resizer2" class="resizer"></div>
    
    <!-- Column 3: Reader -->
    <section id="readerColumn" class="reader"></section>
    
    <!-- Drafts Modal -->
    <div id="draftsModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-black uppercase tracking-[0.2em] text-brand-600">Draft Box</h3>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mt-1">Local workspace research tasks</p>
                </div>
                <button onclick="closeDraftsModal()" class="p-2 hover:bg-gray-100 rounded-lg">&times;</button>
            </div>
            <div id="draftsList" class="p-6 max-h-96 overflow-y-auto"></div>
        </div>
    </div>
    
    <!-- Trash Modal -->
    <div id="trashModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-black uppercase tracking-[0.2em] text-red-600">Recycle Bin</h3>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mt-1">Soft-deleted research archives</p>
                </div>
                <button onclick="closeTrashModal()" class="p-2 hover:bg-gray-100 rounded-lg">&times;</button>
            </div>
            <div id="trashList" class="p-6 max-h-96 overflow-y-auto"></div>
        </div>
    </div>
    
    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu hidden">
        <div class="menu-item" onclick="handleEditFromMenu()">Edit Metadata</div>
        <div class="menu-item menu-item-danger" onclick="handleDeleteFromMenu()">Purge Document</div>
    </div>

    <!-- App Entry -->
    <script type="module">
        import App from './src/app.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const app = new App();
                await app.init();
                window.geekForum = app;
                console.log('[App] Initialized successfully');
            } catch (error) {
                console.error('[App] Init failed:', error);
            }
        });
    </script>
    
    <!-- Global Handlers -->
    <script>
    window.handleEditFromMenu = function() {
        const app = window.geekForum;
        if (app) app.handleEditFromMenu();
    };
    window.handleDeleteFromMenu = function() {
        const app = window.geekForum;
        if (app) app.handleDeleteFromMenu();
    };
    window.closeDraftsModal = function() {
        const m = document.getElementById('draftsModal');
        if (m) { m.classList.add('hidden'); m.classList.remove('flex'); }
    };
    window.closeTrashModal = function() {
        const m = document.getElementById('trashModal');
        if (m) { m.classList.add('hidden'); m.classList.remove('flex'); }
    };
    </script>
</body>
</html>
